<style>
:root{
  --bg:#0a0a0a;--surface:#111114;--surface2:#1a1a1e;--border:#2a2a2e;

  --r:10px;--r-sm:6px;
  --shadow:0 4px 20px rgba(0,0,0,.4);

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* HEADER */
#miveHeader{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:54px;background:rgba(10,10,10,0.95);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1rem;gap:.75rem;
}

.header-spacer{flex:1;}
.nav-tabs{display:flex;gap:.15rem;}
.nav-tab{
  padding:.32rem .68rem;border-radius:var(--r-sm);
  font-family:var(--sans);font-size:.65rem;font-weight:600;
  border:none;cursor:pointer;transition:all .15s;
  background:transparent;color:var(--muted);
}
.nav-tab.active{background:var(--blue-dim);color:var(--blue);outline:1px solid rgba(59,130,246,0.3);}
.nav-tab:hover:not(.active){color:var(--text);background:var(--surface2);}
.btn-back-mv{
  padding:.28rem .6rem;border-radius:var(--r-sm);
  background:var(--btn-bg);border:1px solid var(--border);
  color:var(--muted);font-family:var(--sans);font-size:.6rem;font-weight:600;
  cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:.25rem;
}
.btn-back-mv:hover{color:var(--text);}

/* BODY */
body{padding-top:54px;}
.screen{display:none;height:calc(100vh - 54px);flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ============================================================
   ECRAN BIBLIOTHEQUE &#x2014; meme m&#x00E9;canique que M&V mobile
   ============================================================ */

/* Ligne compteur + tri */
.mob-count-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:.38rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.mob-count-label{font-size:.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.mob-sort-select{
  font-size:.6rem;font-weight:700;color:var(--muted);background:var(--surface2);
  border:1.5px solid var(--border);border-radius:50px;padding:.18rem .55rem;
  cursor:pointer;font-family:var(--sans);outline:none;
  display:flex;align-items:center;gap:.25rem;
}
.sort-menu-item{
  padding:.48rem .85rem;font-size:.68rem;font-weight:600;color:var(--muted);
  cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:background .12s;
}
.sort-menu-item:hover{background:var(--surface2);color:var(--text);}
.sort-menu-item.active-sort{color:var(--blue);}

/* Onglets Mive / M&V */
.mob-tab-row{
  display:flex;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.mob-tab-btn{
  flex:1;padding:.55rem .5rem;font-size:.7rem;font-weight:700;
  border:none;background:transparent;color:var(--muted);cursor:pointer;
  font-family:var(--sans);border-bottom:2px solid transparent;transition:all .15s;
}
.mob-tab-btn.mob-tab-active{color:var(--blue);border-bottom-color:var(--blue);}

/* Liste scrollable */
.mob-list-wrap{position:relative;flex:1;overflow:hidden;display:flex;}
.mob-loop-list{
  flex:1;overflow-y:auto;background:var(--bg);
  -webkit-overflow-scrolling:touch;padding-bottom:120px;padding-right:22px;
}
.mob-loop-list::-webkit-scrollbar{display:none;}

/* S&#x00E9;parateurs alpha */
.alpha-sep{
  padding:.25rem 1rem .1rem;font-size:.58rem;font-weight:900;
  color:var(--blue);letter-spacing:.12em;text-transform:uppercase;
  background:var(--surface2);border-bottom:1px solid var(--border);
}

/* Index lat&#x00E9;ral */
.alpha-index{
  position:absolute;right:2px;top:0;bottom:120px;
  display:flex;flex-direction:column;justify-content:space-evenly;
  align-items:center;z-index:20;padding:4px 0;pointer-events:none;
}
.alpha-index.active{pointer-events:all;}
.alpha-letter{
  font-size:.5rem;font-weight:900;color:var(--blue);
  cursor:pointer;padding:1px 4px;border-radius:3px;
  -webkit-tap-highlight-color:transparent;line-height:1.1;
}
.alpha-letter.hit{background:var(--blue);color:#fff;}

/* Card loop */
.mob-loop-card{
  padding:.82rem 1rem;border-bottom:1px solid var(--border);
  cursor:pointer;background:var(--bg);transition:background .12s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:.65rem;
}
.mob-loop-card:active{background:var(--surface);}
.mob-loop-card-info{flex:1;min-width:0;}
.mob-loop-card-title{
  font-size:.88rem;font-weight:800;color:var(--text);text-transform:uppercase;
  letter-spacing:-.01em;line-height:1.25;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.mob-loop-card-tags{display:flex;gap:.28rem;flex-wrap:wrap;align-items:center;}
.loop-tag{
  font-family:var(--mono);font-size:.55rem;
  padding:.1rem .38rem;border-radius:4px;
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
}
.loop-tag.bpm{color:var(--blue);border-color:rgba(59,130,246,.3);background:var(--blue-dim);}
.loop-tag.mv{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.1);}
.btn-play-mini{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:var(--blue-dim);border:1px solid rgba(59,130,246,.3);
  color:var(--blue);font-size:.7rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.btn-play-mini:hover,.btn-play-mini.playing{background:var(--blue);color:#fff;}

/* ============================================================
   PILLS GENRE &#x2014; flottantes au-dessus de la barre
   ============================================================ */
.mob-filters{
  position:fixed;
  bottom:calc(3.6rem + env(safe-area-inset-bottom) + 6px);
  left:50%;transform:translateX(-50%);
  width:min(92vw,400px);
  padding:.38rem .75rem;overflow-x:auto;display:flex;gap:.32rem;
  scrollbar-width:none;border-radius:50px;z-index:49;
  background:rgba(10,10,10,0.35);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 2px 16px rgba(0,0,0,.18);
  transition:opacity .35s ease, transform .35s ease;opacity:1;
}
.mob-filters::-webkit-scrollbar{display:none;}
.mob-filters.frosted{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(6px);}
.mob-filter-pill{
  flex-shrink:0;padding:.2rem .68rem;border-radius:50px;font-size:.63rem;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);
  white-space:nowrap;transition:all .12s;-webkit-tap-highlight-color:transparent;
}
.mob-filter-pill.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.mob-filter-pill.frosted{opacity:0;border-color:transparent;background:transparent;color:transparent;}

/* ============================================================
   BARRE DU BAS &#x2014; m&#x00EA;me m&#x00E9;canique que M&V
   ============================================================ */
.mob-bottom-bar{
  position:fixed;
  bottom:calc(.65rem + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  width:min(88vw,380px);
  padding:.42rem .55rem;
  display:flex;gap:.38rem;align-items:center;
  z-index:50;border-radius:50px;
  background:rgba(15,15,15,0.25);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.13);
  box-shadow:0 2px 16px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,0.07);
  transition:background .25s, border-color .25s, box-shadow .25s, backdrop-filter .25s;
}
/* Etat scroll &#x2014; dispara&#x00EE;t */
.mob-bottom-bar.frosted{
  background:rgba(0,0,0,0.04);
  backdrop-filter:none;-webkit-backdrop-filter:none;
  border:1px solid rgba(255,255,255,0.04);
  box-shadow:none;
}

/* Recherche dans la barre */
.mob-search-wrap{flex:1;position:relative;}
.mob-search-wrap::before{
  content:'';
  position:absolute;left:.68rem;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border:1.5px solid rgba(255,255,255,0.45);border-radius:50%;
  pointer-events:none;transition:opacity .4s;
}
.mob-search-wrap::after{
  content:'';
  position:absolute;left:1.18rem;top:calc(50% + 2.5px);
  width:3.5px;height:1.5px;background:rgba(255,255,255,0.45);transform:rotate(45deg);
  pointer-events:none;transition:opacity .4s;
}
.mob-search-wrap input{
  width:100%;padding:.48rem .85rem .48rem 1.9rem;
  border-radius:0;font-family:var(--sans);font-size:.78rem;font-weight:500;outline:none;
  background:transparent !important;border:none !important;box-shadow:none !important;
  color:rgba(255,255,255,0.88);transition:color .4s;-webkit-appearance:none;
}
.mob-search-wrap input::placeholder{color:rgba(255,255,255,0.45);transition:color .4s;}
.mob-search-wrap input:focus{color:var(--text) !important;}
.mob-search-wrap input:focus::placeholder{color:var(--muted) !important;}

/* Etat scroll &#x2014; recherche dispara&#x00EE;t */
.mob-bottom-bar.frosted .mob-search-wrap input{color:transparent;}
.mob-bottom-bar.frosted .mob-search-wrap input::placeholder{color:transparent;}
.mob-bottom-bar.frosted .mob-search-wrap::before{opacity:0;}
.mob-bottom-bar.frosted .mob-search-wrap::after{opacity:0;}

/* Bouton +Loop */
.mob-add-btn{
  flex-shrink:0;padding:.38rem .8rem;border-radius:50px;
  background:rgba(59,130,246,0.20);
  border:1px solid rgba(59,130,246,0.30);
  color:rgba(255,255,255,0.90);
  font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s, color .35s, background .35s, border-color .35s;
  font-family:var(--sans);
}
.mob-add-btn:active{opacity:.7;}
/* Etat scroll &#x2014; +Loop dispara&#x00EE;t */
.mob-bottom-bar.frosted .mob-add-btn{
  color:transparent;background:transparent;border-color:transparent;pointer-events:none;
}

/* ============================================================
   ECRANS SETLISTS & ARRANGEMENT
   ============================================================ */
.screen-inner{flex:1;overflow-y:auto;padding:1rem;}
.btn{
  padding:.42rem .9rem;border-radius:var(--r-sm);
  font-family:var(--sans);font-size:.7rem;font-weight:600;
  border:1px solid var(--border);background:var(--btn-bg);color:var(--text);
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem;
}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:#2563eb;}
.btn-sm{padding:.26rem .55rem;font-size:.62rem;}
.btn-danger{background:transparent;border-color:transparent;color:var(--red);}
.setlist-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:.82rem 1rem;display:flex;align-items:center;gap:.75rem;
  cursor:pointer;transition:all .15s;margin-bottom:.4rem;
}
.setlist-card:hover{border-color:var(--blue);}
.badge-src{font-family:var(--mono);font-size:.56rem;padding:.1rem .36rem;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.badge-src.mv{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.1);}

/* Arrangement */
.arr-toolbar{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.arr-setlist-name{font-weight:800;font-size:.85rem;flex:1;}
.view-btn{padding:.26rem .62rem;border-radius:var(--r-sm);font-size:.6rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.view-btn.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.3);}
.setlist-item-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .85rem;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);margin-bottom:.35rem;cursor:pointer;transition:all .15s;}
.setlist-item-row:hover{border-color:var(--blue-dim);}
.setlist-item-row.active-section{border-color:var(--blue);background:var(--blue-dim);}
.sil-num{font-family:var(--mono);font-size:.58rem;color:var(--muted);width:16px;text-align:center;flex-shrink:0;}
.sil-title{flex:1;font-weight:700;font-size:.8rem;}

/* Section navigation */
.section-nav{display:flex;align-items:center;gap:.65rem;padding:.6rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.section-nav-btn{width:28px;height:28px;border-radius:50%;background:var(--btn-bg);border:1px solid var(--border);color:var(--text);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.section-nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.section-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.section-info{flex:1;text-align:center;}
.section-name{font-weight:800;font-size:.88rem;}
.section-counter{font-family:var(--mono);font-size:.55rem;color:var(--muted);margin-top:1px;}
.bpm-ctrl{display:flex;align-items:center;gap:.35rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:.25rem .45rem;}
.bpm-btn{width:18px;height:18px;border-radius:3px;background:var(--btn-bg);border:1px solid var(--border);color:var(--text);font-size:.68rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);}
.bpm-btn:hover{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}
.bpm-val{font-family:var(--mono);font-size:.7rem;font-weight:700;color:var(--blue);min-width:34px;text-align:center;}
.bpm-lbl{font-family:var(--mono);font-size:.48rem;color:var(--muted);}
.grid-container{flex:1;overflow-y:auto;padding:.85rem 1rem;display:flex;flex-direction:column;gap:.6rem;}
.track-row{display:flex;gap:.55rem;align-items:stretch;}
.track-label{width:96px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.5rem .65rem;display:flex;flex-direction:column;justify-content:center;}
.track-label-name{font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.track-label-loop{font-size:.64rem;font-weight:700;margin-top:.18rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-label-loop.empty{color:var(--muted);font-style:italic;font-weight:400;}
.track-cell{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:.5rem .75rem;display:flex;align-items:center;gap:.55rem;min-height:52px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.track-cell:hover{border-color:var(--blue);}
.track-cell.has-loop{border-color:rgba(59,130,246,.3);}
.track-cell.playing{border-color:var(--blue);background:var(--blue-dim);}
.track-cell.playing::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);animation:pulseBar 1s ease-in-out infinite;}
@keyframes pulseBar{0%,100%{opacity:1}50%{opacity:.4}}
.track-cell-name{flex:1;font-size:.7rem;font-weight:700;}
.track-cell-empty{font-size:.66rem;color:var(--muted);font-style:italic;}
.waveform{display:flex;align-items:center;gap:2px;height:18px;opacity:.6;}
.waveform-bar{width:2px;background:var(--blue);border-radius:1px;animation:wave 1.2s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.mixer-panel{border-top:1px solid var(--border);padding:.7rem 1rem;display:flex;gap:.9rem;align-items:flex-end;flex-shrink:0;background:var(--surface);}
.mixer-channel{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:50px;}
.mixer-channel-label{font-size:.54rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:center;}
.mixer-btns{display:flex;gap:.18rem;}
.mixer-btn{padding:.16rem .32rem;border-radius:3px;font-family:var(--mono);font-size:.5rem;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;}
.mixer-btn.mute.active{background:rgba(239,68,68,.2);border-color:var(--red);color:var(--red);}
.mixer-btn.solo.active{background:rgba(234,179,8,.2);border-color:#eab308;color:#eab308;}
.fader-wrap{display:flex;flex-direction:column;align-items:center;gap:.3rem;height:90px;justify-content:center;}
.fader-v-container{position:relative;width:18px;height:70px;display:flex;align-items:center;justify-content:center;}
/* Track */
.fader-v-container::before{
  content:'';position:absolute;left:50%;top:0;bottom:0;
  width:3px;transform:translateX(-50%);
  background:var(--border);border-radius:2px;
}
/* Fill (via JS) */
.fader-v-fill{
  position:absolute;left:50%;bottom:0;width:3px;transform:translateX(-50%);
  background:var(--blue);border-radius:2px;transition:height .05s;pointer-events:none;
}
input[type=range].fader-v{
  -webkit-appearance:none;appearance:none;
  position:absolute;
  width:70px;height:18px;
  transform:rotate(-90deg);
  transform-origin:center center;
  background:transparent;outline:none;cursor:pointer;
  margin:0;padding:0;border:none;
}
input[type=range].fader-v::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:2px solid var(--blue);
  box-shadow:0 0 4px rgba(59,130,246,.4);
  cursor:pointer;
}
input[type=range].fader-v::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:2px solid var(--blue);cursor:pointer;
}
input[type=range].fader-v::-webkit-slider-runnable-track{background:transparent;}
input[type=range].fader-v::-moz-range-track{background:transparent;}
.fader-val{font-family:var(--mono);font-size:.5rem;color:var(--muted);}
.live-bar{display:flex;align-items:center;gap:.55rem;padding:.62rem 1rem;border-top:1px solid var(--border);flex-shrink:0;background:rgba(10,10,10,.95);}
.live-status{display:flex;align-items:center;gap:.3rem;font-family:var(--mono);font-size:.58rem;color:var(--muted);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;}
.live-dot.active{background:var(--blue);box-shadow:0 0 5px var(--blue-glow);animation:blink 1.5s ease-in-out infinite;}
.live-dot.playing{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.5);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.beat-dots{display:flex;gap:2.5px;}
.beat-dot{width:4.5px;height:4.5px;border-radius:50%;background:var(--border);}
.beat-dot.on{background:var(--blue);}
.btn-live-play{padding:.44rem 1rem;border-radius:var(--r-sm);background:var(--blue);border:none;color:#fff;font-family:var(--sans);font-size:.7rem;font-weight:700;cursor:pointer;box-shadow:0 0 10px var(--blue-glow);}
.btn-live-play.playing{background:var(--red);}
.btn-next-sec{padding:.44rem .95rem;border-radius:var(--r-sm);background:var(--btn-bg);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:.68rem;font-weight:600;cursor:pointer;margin-left:auto;}
.btn-next-sec:hover{border-color:var(--blue);color:var(--blue);}
.btn-next-sec:disabled{opacity:.3;cursor:not-allowed;}

/* Bouton + setlist dans la loop card */
.btn-add-setlist{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.28);
  color:var(--blue);font-size:1.05rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
}
.btn-add-setlist:active{background:var(--blue);color:#fff;}

/* Drawer setlist picker */
#slPickerOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
}
#slPickerOverlay.hidden{display:none;}
#slPickerDrawer{
  background:var(--surface);border-radius:18px 18px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:520px;
  padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  max-height:75vh;overflow-y:auto;
}
.sl-picker-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto .9rem;}
.sl-picker-title{font-size:.82rem;font-weight:800;margin-bottom:.7rem;color:var(--text);}
.sl-picker-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.65rem .85rem;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all .12s;margin-bottom:.32rem;
  -webkit-tap-highlight-color:transparent;
}
.sl-picker-item:active{border-color:var(--blue);background:var(--blue-dim);}
.sl-picker-item-name{flex:1;font-size:.8rem;font-weight:700;}
.sl-picker-item-count{font-family:var(--mono);font-size:.58rem;color:var(--muted);}
.sl-picker-new{
  display:flex;align-items:center;gap:.6rem;
  padding:.6rem .85rem;border-radius:var(--r-sm);
  border:1.5px dashed var(--border);background:transparent;
  cursor:pointer;margin-top:.5rem;color:var(--muted);font-size:.78rem;font-weight:600;
  -webkit-tap-highlight-color:transparent;width:100%;font-family:var(--sans);
}
.sl-picker-new:active{border-color:var(--blue);color:var(--blue);}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
/* Drawer depuis le bas pour upload */
.overlay-bottom{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay-bottom.hidden{display:none;}
.drawer-modal{
  background:var(--surface);border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:540px;
  padding:1.1rem 1.1rem calc(1.4rem + env(safe-area-inset-bottom));
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto .85rem;}
.overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.modal-title{font-weight:800;font-size:.9rem;}
.modal-close{width:25px;height:25px;border-radius:50%;border:none;background:var(--surface2);color:var(--muted);cursor:pointer;font-size:.78rem;}
.form-row{margin-bottom:.7rem;}
.form-row label{display:block;font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.28rem;}
.fi{width:100%;padding:.44rem .72rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--sans);font-size:.76rem;outline:none;}
.fi:focus{border-color:var(--blue);}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r-sm);padding:.9rem;text-align:center;cursor:pointer;background:var(--surface2);font-size:.7rem;color:var(--muted);font-weight:600;display:block;}
.upload-zone:hover{border-color:var(--blue);color:var(--blue);}
.upload-zone input{display:none;}
.form-actions{display:flex;gap:.4rem;justify-content:flex-end;margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--border);}
.radio-group{display:flex;flex-direction:column;gap:.38rem;margin-top:.22rem;}
.radio-option{display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;border-radius:var(--r-sm);border:1px solid var(--border);cursor:pointer;}
.radio-option:hover{border-color:var(--blue);}
.radio-option input{accent-color:var(--blue);}
.radio-option-label{font-size:.72rem;font-weight:700;}
.radio-option-sub{font-size:.6rem;color:var(--muted);}
.loop-picker-list{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:.22rem;margin-top:.5rem;}
.loop-picker-item{display:flex;align-items:center;gap:.55rem;padding:.45rem .7rem;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .12s;}
.loop-picker-item:hover{border-color:var(--blue);background:var(--blue-dim);}
.loop-picker-item-title{flex:1;font-size:.74rem;font-weight:700;}
.lp-tabs{display:flex;gap:.22rem;margin-bottom:.48rem;}
.lp-tab{padding:.24rem .58rem;border-radius:var(--r-sm);font-size:.6rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.lp-tab.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.3);}

#miveToast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.45rem .95rem;border-radius:50px;font-size:.7rem;font-weight:600;box-shadow:var(--shadow);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;}
#miveToast.show{opacity:1;}
</style>
</head>

    <div style="position:relative;flex-shrink:0;">
      <button class="mob-sort-select" id="libSortBtn" onclick="toggleSortMenu()" style="display:flex;align-items:center;gap:.28rem;">
        <span id="libSortLabel">A &#8594; Z</span><span style="opacity:.45;font-size:.52rem;">&#9660;</span>
      </button>
      <div id="libSortMenu" style="display:none;position:absolute;right:0;top:110%;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:200;min-width:130px;overflow:hidden;box-shadow:var(--shadow);">
        <div class="sort-menu-item active-sort" onclick="setSort('alpha',this)">A &#8594; Z</div>
        <div class="sort-menu-item" onclick="setSort('bpm_asc',this)">BPM &#8593;</div>
        <div class="sort-menu-item" onclick="setSort('bpm_desc',this)">BPM &#8595;</div>
        <div class="sort-menu-item" onclick="setSort('recent',this)">R&eacute;cents</div>
      </div>
    </div>
  </div>

  <!-- Liste -->

    <div class="mob-loop-list" id="mobLoopList"></div>

</div><!-- end screenLib -->

<!-- SCREEN SETLISTS -->

<!-- SCREEN ARRANGEMENT -->
<div class="screen" id="screenArr">
  <div class="arr-toolbar">
    <div class="arr-setlist-name" id="arrSetlistName">Aucune setlist</div>
    <div style="display:flex;gap:.18rem;">
      <button class="view-btn active" id="btnViewList" onclick="switchArrView('list')">Liste</button>
      <button class="view-btn" id="btnViewGrid" onclick="switchArrView('grid')">Arr.</button>
    </div>
  </div>
  <div id="arrListView" style="flex:1;overflow-y:auto;padding:.85rem 1rem;"></div>
  <div id="arrGridView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <div class="section-nav">
      <button class="section-nav-btn" id="btnPrev" onclick="prevSection()" disabled>&#8592;</button>
      <div class="section-info">
        <div class="section-name" id="sectionName">-</div>
        <div class="section-counter" id="sectionCounter">0 / 0</div>
      </div>
      <button class="section-nav-btn" id="btnNext2" onclick="nextSection()">&#8594;</button>
      <div class="bpm-ctrl">
        <button class="bpm-btn" onclick="adjustBpm(-1)">-</button>
        <div><div class="bpm-val" id="bpmDisplay">--</div><div class="bpm-lbl">BPM</div></div>
        <button class="bpm-btn" onclick="adjustBpm(1)">+</button>
      </div>
    </div>
    <div class="grid-container">
      <div class="track-row">
        <div class="track-label"><div class="track-label-name">Rythmique</div><div class="track-label-loop empty" id="t1label">Aucune</div></div>
        <div class="track-cell" id="tc1" onclick="openLoopPicker(1)"><div class="track-cell-empty">Assigner une loop</div></div>
      </div>
      <div class="track-row">
        <div class="track-label"><div class="track-label-name">Pad Harm.</div><div class="track-label-loop empty" id="t2label">Aucune</div></div>
        <div class="track-cell" id="tc2" onclick="openLoopPicker(2)"><div class="track-cell-empty">Assigner un pad</div></div>
      </div>
    </div>
    <div class="mixer-panel">
      <div class="mixer-channel">
        <div class="mixer-channel-label">Rythm.</div>
        <div class="mixer-btns"><button class="mixer-btn mute" id="mb1" onclick="toggleMute(1)">M</button><button class="mixer-btn solo" id="sb1" onclick="toggleSolo(1)">S</button></div>
        <div class="fader-wrap"><div class="fader-v-container"><div class="fader-v-fill" id="ff1" style="height:80%"></div><input type="range" class="fader-v" id="f1" min="0" max="100" value="80" oninput="setVol(1,this.value)"></div><div class="fader-val" id="fv1">80</div></div>
      </div>
      <div class="mixer-channel">
        <div class="mixer-channel-label">Pad H.</div>
        <div class="mixer-btns"><button class="mixer-btn mute" id="mb2" onclick="toggleMute(2)">M</button><button class="mixer-btn solo" id="sb2" onclick="toggleSolo(2)">S</button></div>
        <div class="fader-wrap"><div class="fader-v-container"><div class="fader-v-fill" id="ff2" style="height:70%"></div><input type="range" class="fader-v" id="f2" min="0" max="100" value="70" oninput="setVol(2,this.value)"></div><div class="fader-val" id="fv2">70</div></div>
      </div>
    </div>
    <div class="live-bar">
      <div class="live-status"><div class="live-dot" id="liveDot"></div><span id="liveStatusTxt">En attente</span></div>
      <div style="display:flex;align-items:center;gap:2.5px;margin-left:.4rem;">
        <span style="font-family:var(--mono);font-size:.48rem;color:var(--muted);">BEAT</span>
        <div class="beat-dots" id="beatDots"><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div></div>
      </div>
      <button class="btn-live-play" id="btnLivePlay" onclick="toggleLive()">&#9654; PLAY</button>
      <button class="btn-next-sec" id="btnNextSec" onclick="nextSection()" disabled>Suivant &#8594;</button>
    </div>
  </div>
</div>

<!-- MODAL UPLOAD -->
<div class="overlay-bottom hidden" id="uploadOverlay" onclick="closeUpload(event)">
  <div class="drawer-modal" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title">Ajouter une loop</div>
      <button class="modal-close" onclick="document.getElementById('uploadOverlay').classList.add('hidden')">&#x2715;</button>
    </div>
    <div class="form-row">
      <label>Titre *</label>
      <input type="text" class="fi" id="upTitle" placeholder="Ex: Groove gospel">
    </div>
    <div style="display:flex;gap:.6rem;">
      <div class="form-row" style="flex:1;">
        <label>BPM</label>
        <input type="number" class="fi" id="upBpm" placeholder="100" min="40" max="240">
      </div>
      <div class="form-row" style="flex:1;">
        <label>Genre</label>
        <input type="text" class="fi" id="upGenre" placeholder="Gospel...">
      </div>
      <div class="form-row" style="flex:1;">
        <label>Signature</label>
        <select class="fi" id="upTimeSig">
          <option value="">--</option>
          <option value="4/4">4/4</option>
          <option value="3/4">3/4</option>
          <option value="6/8">6/8</option>
          <option value="12/8">12/8</option>
          <option value="2/4">2/4</option>
          <option value="5/4">5/4</option>
          <option value="7/8">7/8</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Fichier audio</label>

<script>
// STATE
var _loops=[],_loopsMv=[],_setlists=[],_activeSetlist=null,_setlistItems=[];
var _libSource='mive',_libSort='alpha',_genreFilter=null;
var _curSection=0,_curBpm=120;
var _audioCtx=null,_sources={1:null,2:null},_gainNodes={1:null,2:null};
var _volumes={1:.8,2:.7},_muted={1:false,2:false},_soloed={1:false,2:false};
var _isPlaying=false,_metro=null,_beat=0;
var _lpTrack=1,_lpTab='mive';
var _previewSrc=null,_previewId=null;
var _isFrosted=false,_scrollTimer=null;

// TOAST
function toast(msg,dur){dur=dur||2500;var el=document.getElementById('miveToast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},dur);}

// SCREENS
function switchScreen(id,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});

// FROSTED GLASS \u2014 exactement comme M&V
(function(){
  var _listEl,_barEl,_filtersEl;
  function setFrosted(on){
    if(_isFrosted===on) return;
    _isFrosted=on;
    if(_barEl) _barEl.classList.toggle('frosted',on);
    if(_filtersEl) _filtersEl.classList.toggle('frosted',on);
  }
  function onScroll(){
    setFrosted(true);
    clearTimeout(_scrollTimer);
    _scrollTimer=setTimeout(function(){setFrosted(false);},600);
  }
  function initFrosted(){
    if(_listEl) _listEl.removeEventListener('scroll',onScroll);
    _listEl=document.getElementById('mobLoopList');
    _barEl=document.getElementById('libBottomBar');
    _filtersEl=document.getElementById('libFilters');
    if(!_listEl||!_barEl) return;
    _listEl.addEventListener('scroll',onScroll,{passive:true});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',initFrosted);
  else initFrosted();
  window._reinitFrosted=initFrosted;
})();

// SORT MENU
function toggleSortMenu(){
  var m=document.getElementById('libSortMenu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){

// PILLS
function setGenreFilter(genre,el){
  _genreFilter=genre;
  document.querySelectorAll('.mob-filter-pill').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  renderLoopList();
}
function renderPills(){
  var loops=_loops.concat(_loopsMv);
  var genres=[];
  loops.forEach(function(l){var g=l.genre||l.stem_category;if(g&&genres.indexOf(g)<0)genres.push(g);});
  genres.sort();
  var wrap=document.getElementById('libFilters');
  if(!wrap) return;
  wrap.innerHTML='<div class="mob-filter-pill active" onclick="setGenreFilter(null,this)">Tous</div>'+
    genres.map(function(g){return '<div class="mob-filter-pill" onclick="setGenreFilter(\''+g+'\',this)">'+g+'</div>';}).join('');
}

// RENDER LISTE
function renderLoopList(){
  var el=document.getElementById('mobLoopList');
  if(!el) return;
  el.scrollTop=0;
  var allLoops=_loops.map(function(l){return Object.assign({},l,{_src:'mive'});})
    .concat(_loopsMv.map(function(l){return Object.assign({},l,{_src:'mv'});}));
  var loops=allLoops.slice();
  var q=(document.getElementById('libSearchInput')?document.getElementById('libSearchInput').value:'').toLowerCase();
  if(q) loops=loops.filter(function(l){return (l.title||l.stem_label||'').toLowerCase().indexOf(q)>=0||(l.genre||'').toLowerCase().indexOf(q)>=0;});
  if(_genreFilter) loops=loops.filter(function(l){return (l.genre||l.stem_category||'')=== _genreFilter;});
  if(_libSort==='alpha') loops.sort(function(a,b){return (a.title||a.stem_label||'').localeCompare(b.title||b.stem_label||'');});
  else if(_libSort==='bpm_asc') loops.sort(function(a,b){return (a.bpm||a.song_bpm||0)-(b.bpm||b.song_bpm||0);});
  else if(_libSort==='bpm_desc') loops.sort(function(a,b){return (b.bpm||b.song_bpm||0)-(a.bpm||a.song_bpm||0);});
  else if(_libSort==='recent') loops.sort(function(a,b){return new Date(b.uploaded_at||0)-new Date(a.uploaded_at||0);});
  document.getElementById('libCount').textContent=loops.length+' loop'+(loops.length!==1?'s':'');
  if(!loops.length){
    el.innerHTML='<div style="padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.78rem;font-weight:600;">Aucune loop trouv\u00e9e</div>';
    var ai=document.getElementById('libAlphaIndex');if(ai){ai.innerHTML='';ai.classList.remove('active');}
    if(window._reinitFrosted) window._reinitFrosted();
    return;
  }
  var isAlpha=_libSort==='alpha';
  var html='',lastLetter='',letters=[];
  loops.forEach(function(l){
    var title=l.title||l.stem_label||l.original_name||'';
    var bpm=l.bpm||l.song_bpm;
    var genre=l.genre||l.stem_category||'';
    if(isAlpha){
      var letter=title.normalize('NFD').replace(/[\u0300-\u036f]/g,'')[0]||'?';
      letter=letter.toUpperCase();
      if(letter!==lastLetter){lastLetter=letter;letters.push(letter);html+='<div class="alpha-sep" data-letter="'+letter+'">'+letter+'</div>';}
    }
    var tags='';
    if(bpm) tags+='<span class="loop-tag bpm">'+bpm+' BPM</span>';
    if(genre) tags+='<span class="loop-tag">'+genre+'</span>';
    if(l.time_signature) tags+='<span class="loop-tag" style="color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.1);">'+l.time_signature+'</span>';
    if(l._src==='mv') tags+='<span class="loop-tag mv">'+(l.song_title||'M&amp;V')+'</span>';
    html+='<div class="mob-loop-card" id="lcard-'+l.id+'">'
      +'<button class="btn-play-mini" id="lplay-'+l.id+'" onclick="previewLoop('+l.id+',event)">&#9654;</button>'
      +'<div class="mob-loop-card-info">'
        +'<div class="mob-loop-card-title">'+title+'</div>'
        +'<div class="mob-loop-card-tags">'+tags+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:.3rem;align-items:center;">'
      +'<button class="btn-add-setlist" onclick="openSlPicker('+l.id+',\''+(l._src||'mive')+'\',event)" title="Ajouter &agrave; une setlist">+</button>'
      +'</div>'
      +'</div>';
  });
  el.innerHTML=html;
  // Alpha index
  var alphaEl=document.getElementById('libAlphaIndex');
  if(alphaEl){
    if(isAlpha&&letters.length>1){
      alphaEl.innerHTML=letters.map(function(l){return '<span class="alpha-letter" onclick="alphaJumpLib(\''+l+'\')">'+l+'</span>';}).join('');
      alphaEl.classList.add('active');
    } else {alphaEl.innerHTML='';alphaEl.classList.remove('active');}
  }
  if(window._reinitFrosted) window._reinitFrosted();
}
function alphaJumpLib(letter){
  var list=document.getElementById('mobLoopList');
  var sep=list.querySelector('[data-letter="'+letter+'"]');
  if(sep) sep.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.alpha-letter').forEach(function(l){l.classList.remove('hit');});
  var al=document.querySelector('.alpha-letter[onclick*="\''+letter+'\'"]');
  if(al){al.classList.add('hit');setTimeout(function(){al.classList.remove('hit');},600);}
}

// AUDIO PREVIEW
// Preview audio \u2014 utilise <audio> natif (fiable iOS)
var _previewAudio = null;
function previewLoop(id,e){
  e.stopPropagation();
  var loops=_loops.concat(_loopsMv);
  var loop=null;
  for(var i=0;i<loops.length;i++){if(loops[i].id===id){loop=loops[i];break;}}
  if(!loop||!loop.file_url){toast('URL manquante');return;}

  // Stop si deja en lecture
  if(_previewId===id){
    if(_previewAudio){_previewAudio.pause();_previewAudio.currentTime=0;_previewAudio=null;}
    _previewId=null;
    document.querySelectorAll('.btn-play-mini').forEach(function(b){b.classList.remove('playing');b.innerHTML='&#9654;';});
    return;
  }
  // Stop le precedent
  if(_previewAudio){_previewAudio.pause();_previewAudio=null;}
  document.querySelectorAll('.btn-play-mini').forEach(function(b){b.classList.remove('playing');b.innerHTML='&#9654;';});

  _previewId=id;
  var pb=document.getElementById('lplay-'+id);
  if(pb){pb.classList.add('playing');pb.innerHTML='&#9646;&#9646;';}

  var audio=new Audio();
  audio.crossOrigin='anonymous';
  audio.src=loop.file_url;
  audio.preload='auto';
  _previewAudio=audio;

  audio.onended=function(){
    _previewId=null;_previewAudio=null;
    var pb2=document.getElementById('lplay-'+id);
    if(pb2){pb2.classList.remove('playing');pb2.innerHTML='&#9654;';}
  };
  audio.onerror=function(){
    toast('Erreur lecture: '+audio.error.message);
    _previewId=null;_previewAudio=null;
    var pb2=document.getElementById('lplay-'+id);
    if(pb2){pb2.classList.remove('playing');pb2.innerHTML='&#9654;';}
  };

  var p=audio.play();
  if(p&&p.catch) p.catch(function(err){
    toast('Lecture impossible: '+err.message);
    _previewId=null;_previewAudio=null;
    if(pb){pb.classList.remove('playing');pb.innerHTML='&#9654;';}
  });
}
function getCtx(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}

  e.stopPropagation();

// UPLOAD
function openUploadModal(){document.getElementById('uploadOverlay').classList.remove('hidden');}
function closeUpload(e){if(e&&e.currentTarget===e.target)document.getElementById('uploadOverlay').classList.add('hidden');}
function handleFile(inp){
  var f=inp.files[0];if(!f) return;
  document.getElementById('upZoneTxt').textContent=f.name;
  if(!document.getElementById('upTitle').value)
    document.getElementById('upTitle').value=f.name.replace(/\.[^.]+$/,'');

async function detectBpm(file){
  try{
    var bpmEl=document.getElementById('upBpm');
    bpmEl.placeholder='Analyse...';
    var ab=await file.arrayBuffer();
    // Contexte offline pour decoder sans jouer
    var ctx=new(window.OfflineAudioContext||window.webkitOfflineAudioContext)(1,44100*30,44100);
    var buf=await ctx.decodeAudioData(ab);
    var data=buf.getChannelData(0);
    var sr=buf.sampleRate;

    // Onset detection par energie RMS sur fenetres de 512 samples
    var winSize=512;
    var hopSize=256;
    var energies=[];
    for(var i=0;i+winSize<data.length;i+=hopSize){
      var sum=0;
      for(var j=0;j<winSize;j++) sum+=data[i+j]*data[i+j];
      energies.push(Math.sqrt(sum/winSize));
    }

    // Seuil adaptatif : moyenne locale * facteur
    var onsets=[];
    var winLocal=43; // ~0.5s
    for(var i=winLocal;i<energies.length-winLocal;i++){
      var local=0;
      for(var j=i-winLocal;j<=i+winLocal;j++) local+=energies[j];
      local/=(2*winLocal+1);
      if(energies[i]>local*1.35 && energies[i]>energies[i-1] && energies[i]>energies[i+1])
        onsets.push(i*hopSize/sr);
    }

    if(onsets.length<4){bpmEl.placeholder='100';return;}

    // Intervalles entre onsets
    var intervals=[];
    for(var i=1;i<onsets.length;i++){
      var dt=onsets[i]-onsets[i-1];
      if(dt>0.25&&dt<2.0) intervals.push(dt);
    }
    if(!intervals.length){bpmEl.placeholder='100';return;}

    // BPM candidat = 60 / median(intervals)
    intervals.sort(function(a,b){return a-b;});
    var med=intervals[Math.floor(intervals.length/2)];
    var bpm=Math.round(60/med);

    // Normaliser dans la plage 60-200
    while(bpm<60) bpm*=2;
    while(bpm>200) bpm/=2;
    bpm=Math.round(bpm);

    if(!document.getElementById('upBpm').value){
      document.getElementById('upBpm').value=bpm;
    }
    bpmEl.placeholder=bpm+' BPM d&#x00E9;tect&#x00E9;';
  }catch(e){
    document.getElementById('upBpm').placeholder='100';
    console.warn('BPM detect error:',e);
  }
}
async function submitUpload(){
  var title=document.getElementById('upTitle').value.trim();
  var bpm=document.getElementById('upBpm').value;
  var genre=document.getElementById('upGenre').value.trim();
  var file=document.getElementById('upFile').files[0];
  if(!title){toast('Titre requis');return;}if(!file){toast('Fichier requis');return;}
  var btn=document.getElementById('btnUpSubmit');btn.textContent='Envoi...';btn.disabled=true;
  var timeSig=document.getElementById('upTimeSig').value;
  var fd=new FormData();fd.append('file',file);fd.append('title',title);
  if(bpm) fd.append('bpm',bpm);if(genre) fd.append('genre',genre);
  if(timeSig) fd.append('time_signature',timeSig);
  try{
    var r=await fetch('/api/mive/loops',{method:'POST',body:fd});
    if(!r.ok) throw new Error(await r.text());
    var loop=await r.json();_loops.unshift(loop);
    renderPills();renderLoopList();closeUpload();toast('Loop ajout\u00e9e !');
    document.getElementById('upTitle').value='';document.getElementById('upBpm').value='';
    document.getElementById('upGenre').value='';document.getElementById('upFile').value='';
    document.getElementById('upZoneTxt').textContent='Cliquer pour s\u00e9lectionner';
  }catch(ex){toast('Erreur: '+ex.message);}
  finally{btn.textContent='Ajouter';btn.disabled=false;}
}

  var cont=document.getElementById('setlistCards');if(!cont) return;

  cont.innerHTML=_setlists.map(function(s){
    return '<div class="setlist-card" onclick="openSetlist('+s.id+')">'
      +'<div style="flex:1;font-weight:700;font-size:.85rem;">'+s.name+'</div>'
      +'<span class="badge-src '+(s.source==='mv'?'mv':'')+'">'+( s.source==='mv'?'M&amp;V':'Mive')+'</span>'
      +'<button class="btn btn-sm btn-danger" onclick="deleteSetlist('+s.id+',event)">\u2715</button>'
      +'</div>';}).join('');
}

async function createSetlist(){
  var name=document.getElementById('newSetlistName').value.trim();
  var src=document.querySelector('input[name=slSrc]:checked');

  if(!name){toast('Nom requis');return;}

  document.getElementById('newSetlistOverlay').classList.add('hidden');
  document.getElementById('newSetlistName').value='';toast('Setlist cr\u00e9\u00e9e !');

async function deleteSetlist(id,e){
  e.stopPropagation();if(!confirm('Supprimer ?')) return;
  await fetch('/api/mive/setlists/'+id,{method:'DELETE'});
  _setlists=_setlists.filter(function(s){return s.id!==id;});

  renderSetlistCards();toast('Setlist supprim\u00e9e');
}
async function openSetlist(id){
  _activeSetlist=_setlists.find(function(s){return s.id===id;})||null;if(!_activeSetlist) return;
  var r=await fetch('/api/mive/setlists/'+id+'/items');
  _setlistItems=await r.json();_curSection=0;

  document.getElementById('tabArr').classList.add('active');

}

// ARRANGEMENT
function renderArrList(){
  var cont=document.getElementById('arrListView');if(!cont) return;
  if(!_setlistItems.length){cont.innerHTML='<div style="padding:2rem;text-align:center;color:var(--muted);font-size:.78rem;">Setlist vide</div>';return;}
  cont.innerHTML=_setlistItems.map(function(item,i){
    var bpmTag=item.bpm?'<span class="loop-tag bpm">'+item.bpm+' BPM</span>':'';
    var keyTag=item.key_signature?'<span class="loop-tag">'+item.key_signature+'</span>':'';
    var rTag=item.loop_rythmique_id?'<span class="loop-tag" style="color:var(--blue)">&#9654; R</span>':'';
    var hTag=item.loop_harmonique_id?'<span class="loop-tag" style="color:var(--green)">&#9654; H</span>':'';
    return '<div class="setlist-item-row '+(i===_curSection?'active-section':'')+'" onclick="goToSection('+i+')">'
      +'<div class="sil-num">'+(i+1)+'</div>'
      +'<div class="sil-title">'+(item.song_title||'Chant sans titre')+'</div>'
      +'<div style="display:flex;gap:.28rem;align-items:center;">'+bpmTag+keyTag+rTag+hTag+'</div>'
      +'</div>';}).join('');
}
function goToSection(i){_curSection=i;renderArrList();switchArrView('grid');}
function switchArrView(v){
  var lv=document.getElementById('arrListView');var gv=document.getElementById('arrGridView');
  document.getElementById('btnViewList').classList.toggle('active',v==='list');
  document.getElementById('btnViewGrid').classList.toggle('active',v==='grid');
  lv.style.display=v==='list'?'':'none';gv.style.display=v==='grid'?'flex':'none';
  if(v==='grid'&&_setlistItems.length) renderSection();
}
function renderSection(){
  var s=_setlistItems[_curSection];if(!s) return;
  document.getElementById('sectionName').textContent=s.song_title||'Chant sans titre';
  document.getElementById('sectionCounter').textContent=(_curSection+1)+' / '+_setlistItems.length;
  document.getElementById('btnPrev').disabled=_curSection===0;
  document.getElementById('btnNext2').disabled=_curSection>=_setlistItems.length-1;
  document.getElementById('btnNextSec').disabled=!_isPlaying||_curSection>=_setlistItems.length-1;
  updateBpm(s.bpm||_curBpm);
  var hasR=!!s.loop_rythmique_id;
  document.getElementById('t1label').textContent=s.loop_rythmique_title||'Aucune';
  document.getElementById('t1label').classList.toggle('empty',!hasR);
  var tc1=document.getElementById('tc1');
  tc1.innerHTML=hasR?'<div style="flex:1"><div class="track-cell-name">'+(s.loop_rythmique_title||'')+'</div></div><div class="waveform">'+Array.from({length:10},function(_,i){return '<div class="waveform-bar" style="height:'+(4+Math.sin(i)*7+7)+'px;animation-delay:'+(i*0.09)+'s"></div>';}).join('')+'</div>':'<div class="track-cell-empty">Cliquer pour assigner</div>';
  tc1.classList.toggle('has-loop',hasR);
  var hasH=!!s.loop_harmonique_id;
  document.getElementById('t2label').textContent=s.loop_harmonique_title||'Aucune';
  document.getElementById('t2label').classList.toggle('empty',!hasH);
  var tc2=document.getElementById('tc2');
  tc2.innerHTML=hasH?'<div style="flex:1"><div class="track-cell-name">'+(s.loop_harmonique_title||'')+'</div></div><div class="waveform">'+Array.from({length:10},function(_,i){return '<div class="waveform-bar" style="height:'+(4+Math.cos(i)*7+7)+'px;animation-delay:'+(i*0.1)+'s;background:#22c55e"></div>';}).join('')+'</div>':'<div class="track-cell-empty">Cliquer pour assigner</div>';
  tc2.classList.toggle('has-loop',hasH);
  document.querySelectorAll('.setlist-item-row').forEach(function(r,i){r.classList.toggle('active-section',i===_curSection);});
}

// LOOP PICKER
function openLoopPicker(track){
  _lpTrack=track;document.getElementById('lpTitle').textContent=track===1?'Loop rythmique':'Pad harmonique';
  _lpTab='mive';document.getElementById('lpTabMive').classList.add('active');document.getElementById('lpTabMv').classList.remove('active');
  renderLpList();document.getElementById('lpOverlay').classList.remove('hidden');
}
function closeLoopPicker(){document.getElementById('lpOverlay').classList.add('hidden');}
function switchLpTab(t){
  _lpTab=t;document.getElementById('lpTabMive').classList.toggle('active',t==='mive');
  document.getElementById('lpTabMv').classList.toggle('active',t==='mv');renderLpList();
}
function renderLpList(){
  var loops=_loops.concat(_loopsMv);var list=document.getElementById('lpList');
  if(!loops.length){list.innerHTML='<div style="padding:1rem;text-align:center;color:var(--muted);font-size:.75rem;">Aucune loop</div>';return;}
  list.innerHTML=loops.map(function(l){
    var bpm=l.bpm||l.song_bpm;
    return '<div class="loop-picker-item" onclick="assignLoop('+l.id+',\''+_lpTab+'\')"><div class="loop-picker-item-title">'+(l.title||l.stem_label||'')+'</div>'+(bpm?'<span class="loop-tag bpm">'+(bpm)+' BPM</span>':'')+(l.genre?'<span class="loop-tag">'+l.genre+'</span>':'')+'</div>';}).join('');
}
async function assignLoop(id,src){
  var s=_setlistItems[_curSection];if(!s) return;
  var loops=_loops.concat(_loopsMv);
  var loop=null;for(var i=0;i<loops.length;i++){if(loops[i].id===id){loop=loops[i];break;}}
  if(!loop) return;
  var isR=_lpTrack===1;
  if(isR){s.loop_rythmique_id=id;s.loop_rythmique_url=loop.file_url;s.loop_rythmique_title=loop.title||loop.stem_label;s.loop_rythmique_bpm=loop.bpm||loop.song_bpm;}
  else{s.loop_harmonique_id=id;s.loop_harmonique_url=loop.file_url;s.loop_harmonique_title=loop.title||loop.stem_label;}
  try{await fetch('/api/mive/setlists/'+_activeSetlist.id+'/items/'+s.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[isR?'loop_rythmique_id':'loop_harmonique_id']:id})});toast('Loop assign\u00e9e');}catch(ex){toast('Erreur');}
  closeLoopPicker();renderSection();
}

// AUDIO ENGINE
function updateBpm(v){_curBpm=v;document.getElementById('bpmDisplay').textContent=v||'--';}
function adjustBpm(d){
  updateBpm(Math.max(40,Math.min(240,_curBpm+d)));
  // Metronome
  if(_metro){stopMetro();startMetro(_curBpm);}
  // Vitesse de lecture \u2014 sans toucher au pitch (preservesPitch)
  [1,2].forEach(function(t){
    var src=_trackNodes[t];
    if(!src) return;
    try{
      // On ne connait pas le BPM original de la loop donc on utilise un ratio
      // base reference = BPM de la section ou 120 si inconnu
      var refBpm=(_setlistItems[_curSection]&&_setlistItems[_curSection].bpm)||120;
      src.playbackRate.value = _curBpm / refBpm;
    }catch(e){}
  });
}
function startMetro(bpm){stopMetro();_beat=0;updateBeats();_metro=setInterval(function(){_beat=(_beat+1)%4;updateBeats();},60000/bpm);document.getElementById('liveDot').classList.add('active');}
function stopMetro(){if(_metro){clearInterval(_metro);_metro=null;}_beat=0;updateBeats();document.getElementById('liveDot').classList.remove('active','playing');}
function updateBeats(){document.querySelectorAll('.beat-dot').forEach(function(d,i){d.classList.toggle('on',i===_beat);});}
// WebAudio BufferSource \u2014 loop sans latence
var _trackNodes = {1:null, 2:null};
var _trackGains = {1:null, 2:null};
var _trackBufs  = {};

// Deux contextes s\u00E9par\u00E9s : preview et arrangement
var _previewCtx = null;
var _arrCtx = null;

function getPreviewCtx(){
  if(!_previewCtx) _previewCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _previewCtx;
}
function getCtx(){
  if(!_arrCtx) _arrCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _arrCtx;
}
async function loadBuf(url, ctx){
  var key = url + (ctx===_previewCtx?'_p':'_a');
  if(_trackBufs[key]) return _trackBufs[key];
  var r=await fetch(url);
  var ab=await r.arrayBuffer();
  // decodeAudioData avec le bon contexte
  var buf = await new Promise(function(resolve,reject){
    ctx.decodeAudioData(ab, resolve, reject);
  });
  _trackBufs[key]=buf;
  return buf;
}
async function playTrack(t,url,vol){
  stopTrack(t,false);
  if(!url) return Promise.resolve();
  try{
    var ctx=getCtx();
    if(ctx.state==='suspended') await ctx.resume();
    var buf=await loadBuf(url, ctx);
    var gain=ctx.createGain();
    gain.gain.setValueAtTime(_muted[t]?0:Math.max(0,Math.min(1,vol)),ctx.currentTime);
    gain.connect(ctx.destination);
    var src=ctx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    // preservesPitch = time-stretching sans changement de tonalite (Safari iOS 16+)
    src.preservesPitch = true;
    if(typeof src.detune !== 'undefined') src.detune.value = 0;
    // Ratio BPM : section BPM / loop BPM d'origine
    var loopOrigBpm = buf._origBpm || _curBpm;
    src.playbackRate.value = _curBpm / loopOrigBpm;
    src.connect(gain);
    src.start(0);
    _trackNodes[t]=src;
    _trackGains[t]=gain;
    // Stocker le BPM d'origine de la loop dans le buffer pour ajustements futurs
    if(!buf._origBpm) buf._origBpm = _curBpm;
  }catch(e){ toast('Erreur piste '+t+': '+e.message); }
}
function stopTrack(t,fade){
  var src=_trackNodes[t];var gain=_trackGains[t];
  if(!src) return;
  if(fade===true&&gain){
    var ctx=getCtx();
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
    setTimeout(function(){try{src.stop();}catch(e){}_trackNodes[t]=null;_trackGains[t]=null;},1600);
  } else {
    try{src.stop();}catch(e){}_trackNodes[t]=null;_trackGains[t]=null;
  }
}
function fadeIn(t,vol){
  var gain=_trackGains[t];if(!gain) return;
  var ctx=getCtx();
  var target=_muted[t]?0:Math.max(0,Math.min(1,vol));
  var dur=Math.max(1.5,60/_curBpm*2);
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(target,ctx.currentTime+dur);
}
function toggleLive(){
  // Resume AudioContext SYNCHRONE dans le handler du tap iOS
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();

  var s=_setlistItems[_curSection];
  var btn=document.getElementById('btnLivePlay');

  if(_isPlaying){
    stopTrack(1,false);stopTrack(2,false);stopMetro();_isPlaying=false;
    btn.innerHTML='&#9654; PLAY';btn.classList.remove('playing');
    document.getElementById('liveStatusTxt').textContent='En attente';
    document.getElementById('liveDot').classList.remove('playing');
    document.getElementById('btnNextSec').disabled=true;
    document.getElementById('tc1').classList.remove('playing');
    document.getElementById('tc2').classList.remove('playing');
    return;
  }
  if(!s){toast('Aucune section');return;}

  _isPlaying=true;
  btn.innerHTML='&#9646;&#9646; STOP';btn.classList.add('playing');
  document.getElementById('liveStatusTxt').textContent='En lecture';
  document.getElementById('liveDot').classList.add('playing');
  document.getElementById('btnNextSec').disabled=false;
  startMetro(s.bpm||_curBpm);

  if(s.loop_rythmique_url){
    document.getElementById('tc1').classList.add('playing');
    playTrack(1,s.loop_rythmique_url,0).then(function(){fadeIn(1,_volumes[1]);});
  }
  if(s.loop_harmonique_url){
    document.getElementById('tc2').classList.add('playing');
    playTrack(2,s.loop_harmonique_url,0).then(function(){fadeIn(2,_volumes[2]);});
  }
}
async function nextSection(){
  if(_curSection>=_setlistItems.length-1) return;
  var next=_setlistItems[_curSection+1];var currBpm=(_setlistItems[_curSection]&&_setlistItems[_curSection].bpm)||_curBpm;
  if(_isPlaying){
    if(Math.abs(currBpm-((next&&next.bpm)||_curBpm))<=15){
      var ctx=getCtx();var fd=2.5;
      [1,2].forEach(function(t){if(_gainNodes[t])_gainNodes[t].gain.linearRampToValueAtTime(0,ctx.currentTime+fd);});
      _curSection++;renderSection();updateBpm((next&&next.bpm)||_curBpm);stopMetro();startMetro(_curBpm);
      setTimeout(async function(){
    stopTrack(1,false);stopTrack(2,false);
    if(next&&next.loop_rythmique_url) playTrack(1,next.loop_rythmique_url,0).then(function(){fadeIn(1,_volumes[1]);});
    if(next&&next.loop_harmonique_url) playTrack(2,next.loop_harmonique_url,0).then(function(){fadeIn(2,_volumes[2]);});
  },fd*1000);
    } else {
      var spb=60/currBpm;var ttm=(4-_beat)*spb;toast('Transition...');
      setTimeout(async function(){
    stopTrack(1,false);stopTrack(2,false);stopMetro();
    _curSection++;renderSection();
    updateBpm((next&&next.bpm)||_curBpm);startMetro(_curBpm);
    if(next&&next.loop_rythmique_url) playTrack(1,next.loop_rythmique_url,0).then(function(){fadeIn(1,_volumes[1]);});
    if(next&&next.loop_harmonique_url) playTrack(2,next.loop_harmonique_url,0).then(function(){fadeIn(2,_volumes[2]);});
  },ttm*1000);
    }
  } else {_curSection++;renderSection();}
}
function prevSection(){if(_curSection<=0) return;if(_isPlaying){toast('Stoppe la lecture avant');return;}_curSection--;renderSection();}
function setVol(t,v){
  _volumes[t]=v/100;
  document.getElementById('fv'+t).textContent=v;
  var ff=document.getElementById('ff'+t);
  if(ff) ff.style.height=v+'%';
  if(_trackGains[t]&&!_muted[t]){
    try{_trackGains[t].gain.setValueAtTime(v/100,getCtx().currentTime);}catch(e){}
  }
}
function toggleMute(t){_muted[t]=!_muted[t];document.getElementById('mb'+t).classList.toggle('active',_muted[t]);if(_trackGains[t]){try{_trackGains[t].gain.setValueAtTime(_muted[t]?0:_volumes[t],getCtx().currentTime);}catch(e){}}}
function toggleSolo(t){_soloed[t]=!_soloed[t];document.getElementById('sb'+t).classList.toggle('active',_soloed[t]);var any=_soloed[1]||_soloed[2];[1,2].forEach(function(x){if(_trackGains[x]){try{_trackGains[x].gain.setValueAtTime((!_muted[x]&&(!any||_soloed[x]))?_volumes[x]:0,getCtx().currentTime);}catch(e){}}});}

// \u2500\u2500 SETLIST PICKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var _slPickerLoopId=null, _slPickerLoopSrc=null;

function openSlPicker(id,src,e){
  e.stopPropagation();
  _slPickerLoopId=id;
  _slPickerLoopSrc=src;
  renderSlPickerList();
  document.getElementById('slPickerOverlay').classList.remove('hidden');
}
function closeSlPicker(e){
  if(!e||e.target===document.getElementById('slPickerOverlay'))
    document.getElementById('slPickerOverlay').classList.add('hidden');
}
function renderSlPickerList(){
  var list=document.getElementById('slPickerList');
  if(!_setlists.length){
    list.innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:.8rem;">Aucune setlist \u2014 cr&#233;en une nouvelle</div>';
    return;
  }
  list.innerHTML=_setlists.map(function(sl){
    return '<div class="sl-picker-item" onclick="addLoopToSetlist('+sl.id+')">'
      +'<div class="sl-picker-item-name">'+sl.name+'</div>'
      +'<span class="sl-picker-item-count badge-src '+(sl.source==='mv'?'mv':'')+'">'+( sl.source==='mv'?'M&V':'Mive')+'</span>'
      +'</div>';
  }).join('');
}
async function addLoopToSetlist(setlistId){
  var loops=_loops.concat(_loopsMv);
  var loop=null;
  for(var i=0;i<loops.length;i++){if(loops[i].id===_slPickerLoopId){loop=loops[i];break;}}
  if(!loop){toast('Loop introuvable');return;}
  try{
    var r=await fetch('/api/mive/setlists/'+setlistId+'/items',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        loop_id: loop.id,
        loop_src: _slPickerLoopSrc,
        song_title: loop.title||loop.stem_label||'Loop sans titre',
        bpm: loop.bpm||loop.song_bpm||null,
        loop_rythmique_id: loop.id,
        loop_rythmique_title: loop.title||loop.stem_label||'',
        loop_rythmique_bpm: loop.bpm||loop.song_bpm||null,
        loop_rythmique_url: loop.file_url
      })
    });
    if(!r.ok) throw new Error(await r.text());
    document.getElementById('slPickerOverlay').classList.add('hidden');
    toast('Ajout\u00E9e \u00E0 la setlist !');
  }catch(ex){toast('Erreur: '+ex.message);}
}
async function slPickerCreateNew(){
  var name=prompt('Nom de la nouvelle setlist :');
  if(!name||!name.trim()) return;
  try{
    var r=await fetch('/api/mive/setlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.trim(),source:'mive'})});
    var sl=await r.json();
    _setlists.unshift(sl);
    renderSetlistCards();
    renderSlPickerList();
    toast('Setlist cr\u00E9\u00E9e !');
  }catch(ex){toast('Erreur: '+ex.message);}
}

// INIT
async function init(){
  try{
    var res=await Promise.all([fetch('/api/mive/loops'),fetch('/api/mive/loops-mv'),fetch('/api/mive/setlists')]);
    _loops=await res[0].json();_loopsMv=await res[1].json();_setlists=await res[2].json();
  }catch(ex){console.warn(ex);}
  renderPills();renderLoopList();renderSetlistCards();
}
init();
</script>
